{% extends 'base.html' %}

{% block head_extra %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
{% endblock %}

{% block content %}
<header class="topbar">
    <div class="topbar-left">
        <h2>你好，{{ username }}</h2>
    </div>
    <div class="topbar-right">
        <span class="date-display" id="current-date"
            style="font-weight:500;color:var(--text-secondary);font-size:14px;margin-right:12px;"></span>
        <button class="btn btn-primary btn-mini" onclick="document.getElementById('title').focus()"
            style="margin-right: 8px;">+ 新建日程</button>
        <button id="logout-btn" class="btn btn-ghost btn-mini" type="button">退出登录</button>
    </div>
</header>

<div class="content-scroll">
    <div class="dashboard-grid">
        <div class="col-left">

            <section class="card" id="section-add">
                <h2>新增日程</h2>
                <form id="schedule-form" class="form-grid">
                    <label>类型</label>
                    <select id="schedule_type" required>
                        <option value="point" selected>时间点</option>
                        <option value="range">时间段</option>
                    </select>

                    <label>标题</label>
                    <input id="title" type="text" required />

                    <label>描述</label>
                    <textarea id="description" rows="3"></textarea>

                    <label>地点（选填）</label>
                    <input id="location" type="text" maxlength="120" placeholder="例如：A301会议室" />

                    <div id="point-time-group" class="time-group">
                        <label>时间点</label>
                        <input id="due_at" type="datetime-local" required />
                    </div>

                    <div id="range-time-group" class="time-group hidden">
                        <label>开始时间</label>
                        <input id="start_at" type="datetime-local" />

                        <label>结束时间</label>
                        <input id="end_at" type="datetime-local" />
                    </div>

                    <label>提醒提前量</label>
                    <div class="inline-checks">
                        <label><input type="checkbox" name="reminder_offsets" value="0m" checked /> 到时提醒</label>
                        <label><input type="checkbox" name="reminder_offsets" value="5m" checked /> 提前5分钟</label>
                        <label><input type="checkbox" name="reminder_offsets" value="10m" /> 提前10分钟</label>
                        <label><input type="checkbox" name="reminder_offsets" value="1d" /> 提前1天</label>
                    </div>

                    <label>提醒时机</label>
                    <select id="reminder_phase">
                        <option value="start" selected>开始提醒</option>
                        <option value="end">结束提醒</option>
                        <option value="both">开始和结束都提醒</option>
                    </select>

                    <label>重复规则</label>
                    <select id="repeat_type">
                        <option value="none" selected>不重复</option>
                        <option value="daily">每天</option>
                        <option value="weekly">每周固定日</option>
                    </select>

                    <div id="weekly-repeat-group" class="time-group hidden">
                        <label>每周重复日（可多选）</label>
                        <div class="inline-checks">
                            <label><input type="checkbox" name="repeat_weekdays" value="0" /> 周一</label>
                            <label><input type="checkbox" name="repeat_weekdays" value="1" /> 周二</label>
                            <label><input type="checkbox" name="repeat_weekdays" value="2" /> 周三</label>
                            <label><input type="checkbox" name="repeat_weekdays" value="3" /> 周四</label>
                            <label><input type="checkbox" name="repeat_weekdays" value="4" /> 周五</label>
                            <label><input type="checkbox" name="repeat_weekdays" value="5" /> 周六</label>
                            <label><input type="checkbox" name="repeat_weekdays" value="6" /> 周日</label>
                        </div>
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%;">创建</button>
                </form>
            </section>

            <section class="card" id="section-list">
                <h2>我的日程</h2>
                <p class="muted">支持完成、编辑、删除。</p>
                <ul id="schedule-list" class="list"></ul>
            </section>
        </div><!-- col-left end -->

        <div class="col-right">

            <section class="card" id="section-calendar">
                <h2>可视化日历日程表</h2>
                <div id="calendar" class="calendar-wrap"></div>
            </section>

            <section class="card" id="section-overdue">
                <h2>过期提醒（登录可见）</h2>
                <ul id="overdue-list" class="list"></ul>
            </section>

        </div><!-- col-right end -->
    </div><!-- dashboard-grid end -->
</div><!-- content-scroll end -->

<div id="reminder-overlay" class="reminder-overlay hidden" role="dialog" aria-modal="true"
    aria-labelledby="reminder-title">
    <div class="reminder-modal">
        <h2 id="reminder-title">日程到时提醒</h2>
        <p id="reminder-message" class="reminder-message">你有待确认的日程提醒。</p>
        <button id="reminder-confirm-btn" class="btn btn-alert" type="button">我已确认</button>
    </div>
</div>

<div id="toast" class="toast hidden"></div>
<button id="add-fab" class="btn-fab" title="添加日程">＋</button>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
