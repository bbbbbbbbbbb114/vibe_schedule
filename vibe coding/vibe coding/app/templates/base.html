<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    {% block head_extra %}{% endblock %}
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">🍊 Vibe Schedule</div>
            <nav class="side-nav">
                <a href="#schedule-form" class="nav-item active">✨ 新增日程</a>
                <a href="#schedule-list" class="nav-item">📋 我的日程</a>
                <a href="#calendar" class="nav-item">📅 可视化日历</a>
                <a href="#overdue-list" class="nav-item">⏳ 过期预警</a>
            </nav>
        </aside>
        <main class="main-wrapper">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
