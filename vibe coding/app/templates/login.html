{% extends 'base.html' %}

{% block layout %}
<div class="auth-layout">
    <div class="auth-left">
        <h1>掌控每一分钟，<br>聚焦重要之事。</h1>
        <p>Vibe Schedule 帮助你以前所未有的清晰度规划时间。无论是单点日程、时间段任务还是灵活的重复提醒，都能轻松搞定。</p>
    </div>
    <div class="auth-right">
        <section class="card auth-card">
            <h2>欢迎回来</h2>
            <p class="muted" style="margin-bottom: 2rem;">登录你的日程空间</p>
            <form id="login-form" class="form-grid">
                <label>用户名</label>
                <input type="text" id="username" maxlength="80" placeholder="例如 alice" required />
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required />
                <button class="btn btn-primary" type="submit" style="margin-top: 1rem;">进入</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                <a href="/register"
                    style="color: var(--primary); text-decoration: none; font-weight: 500;">没有账号？点击注册</a>
            </p>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function showAuthError(message) {
        const errorDiv = document.getElementById('auth-error') || document.createElement('div');
        if (!errorDiv.id) {
            errorDiv.id = 'auth-error';
            errorDiv.style.cssText = 'background:#f8d7da;color:#721c24;padding:12px;border-radius:4px;margin-bottom:1rem;border:1px solid #f5c6cb;display:none;';
            document.querySelector('.auth-card')?.insertBefore(errorDiv, document.getElementById('login-form'));
        }
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    const form = document.getElementById('login-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (res.ok) {
            window.location.href = '/';
            return;
        }

        const errData = await res.json();
        showAuthError(errData.error || '登录失败，请重试');
    });
</script>
{% endblock %}
